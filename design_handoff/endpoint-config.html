<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>织影 · 端点配置</title>
<link rel="stylesheet" href="weaveflux-core.css">
<style>
  /* ── Page-specific: Endpoint Config ── */

  /* ── Settings Section ── */
  .settings-section {
    margin-bottom: 20px;
  }
  .settings-section .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    padding-left: 4px;
  }

  /* ── Input Group ── */
  .input-group {
    background: var(--surface);
    border-radius: var(--radius-card);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .input-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.15s;
  }
  .input-row:last-child { border-bottom: none; }
  .input-row:focus-within { background: rgba(59,130,246,0.03); }

  .input-row .row-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .input-row .row-icon svg { width: 16px; height: 16px; }
  .input-row .row-icon.url { background: rgba(59,130,246,0.12); }
  .input-row .row-icon.url svg { fill: none; stroke: var(--accent2); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .input-row .row-icon.key { background: rgba(16,185,129,0.12); }
  .input-row .row-icon.key svg { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .input-row .row-body { flex: 1; min-width: 0; }
  .input-row .row-body label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 4px;
  }
  .input-row .row-body input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--fg);
    font-size: 14px;
    outline: none;
    font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  }
  .input-row .row-body input::placeholder {
    color: var(--muted);
    opacity: 0.4;
    font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
  }

  .input-row .toggle-vis {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .input-row .toggle-vis svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .input-row .toggle-vis:hover {
    background: rgba(255,255,255,0.06);
    color: var(--fg);
  }

  /* ── Test Connection Button ── */
  .test-section {
    margin-top: 4px;
  }
  .test-btn {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--accent2);
    border-radius: var(--radius-btn);
    background: rgba(59,130,246,0.08);
    color: var(--accent2);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }
  .test-btn:hover:not(:disabled) {
    background: rgba(59,130,246,0.16);
    box-shadow: 0 2px 12px rgba(59,130,246,0.15);
  }
  .test-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .test-btn .btn-spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(59,130,246,0.3);
    border-top-color: var(--accent2);
    border-radius: 50%;
    animation: wf-spin 0.7s linear infinite;
  }
  .test-btn.loading .btn-spinner { display: block; }
  .test-btn.loading .btn-label { display: none; }
  .test-btn.loading { pointer-events: none; }

  /* ── Result Banner ── */
  .result-banner {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-input);
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: all 0.35s ease;
  }
  .result-banner.show {
    opacity: 1;
    max-height: 80px;
  }
  .result-banner.success {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.25);
    color: var(--accent);
  }
  .result-banner.error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    color: var(--danger);
  }
  .result-banner .banner-icon { font-size: 16px; flex-shrink: 0; }
  .result-banner .banner-detail {
    font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
    font-size: 11px;
    margin-top: 2px;
    opacity: 0.8;
    word-break: break-all;
  }

  /* ── Info Card ── */
  .info-card {
    background: var(--surface);
    border-radius: var(--radius-card);
    border: 1px solid var(--border);
    padding: 16px;
    margin-top: 20px;
  }
  .info-card h4 {
    font-size: 14px; font-weight: 600;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .info-card h4 svg { width: 18px; height: 18px; fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .info-card p {
    font-size: 12px; color: var(--muted);
    line-height: 1.6;
  }
  .info-card .security-badges {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .info-card .security-badge {
    font-size: 10px; font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(16,185,129,0.1);
    color: var(--accent);
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>

<div class="device">
  <div class="screen" id="app">

    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">
        <svg viewBox="0 0 16 16"><path d="M1 12h2V8H1v4zm3 0h2V6H4v6zm3 0h2V4H7v8zm3 0h2V2h-2v10zm3 0h2V0h-2v12z"/></svg>
        <svg viewBox="0 0 16 16"><path d="M8 0C3.6 0 0 3.6 0 8s3.6 8 8 8 8-3.6 8-8-3.6-8-8-8zm0 14c-3.3 0-6-2.7-6-6s2.7-6 6-6 6 2.7 6 6-2.7 6-6 6z"/></svg>
        <span class="battery">
          <svg viewBox="0 0 24 12" width="22" height="11"><rect x="0" y="0" width="20" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="2" width="14" height="8" rx="1" fill="currentColor"/><rect x="21" y="3" width="3" height="6" rx="1.5" fill="currentColor"/></svg>
          85%
        </span>
      </span>
    </div>

    <div class="page-header">
      <h2>端点配置</h2>
      <div class="subtitle">兼容 OpenAI 规范 · 本地 KeyStore 加密存储</div>
    </div>

    <div class="content">

      <div class="settings-section">
        <div class="section-label">API 端点</div>
        <div class="input-group">
          <div class="input-row">
            <div class="row-icon url">
              <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </div>
            <div class="row-body">
              <label for="baseUrlInput">Base URL</label>
              <input type="text" id="baseUrlInput" placeholder="https://api.glosc-ai.one/v1" value="https://api.glosc-ai.one/v1" autocomplete="off">
            </div>
          </div>
          <div class="input-row">
            <div class="row-icon key">
              <svg viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
            </div>
            <div class="row-body">
              <label for="apiKeyInput">API Key</label>
              <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxx" value="sk-demo-key-not-configured" autocomplete="off">
            </div>
            <button class="toggle-vis" id="toggleVisBtn" onclick="toggleApiKeyVisibility()" aria-label="显示/隐藏 API Key">
              <svg viewBox="0 0 24 24" id="eyeIcon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="test-section">
        <button class="test-btn" id="testBtn" onclick="testConnection()">
          <span class="btn-label">测试连接</span>
          <span class="btn-spinner"></span>
        </button>
        <div class="result-banner" id="resultBanner">
          <span class="banner-icon"></span>
          <div>
            <div class="banner-text"></div>
            <div class="banner-detail"></div>
          </div>
        </div>
      </div>

      <div class="info-card">
        <h4>
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          安全说明
        </h4>
        <p>你的 API 凭证仅存储在本地 Android KeyStore 中，使用 AES-256 硬件级加密。织影不会将任何凭证上传至远程服务器。清除应用缓存或卸载将彻底抹除所有配置。</p>
        <div class="security-badges">
          <span class="security-badge">Android KeyStore</span>
          <span class="security-badge">AES-256</span>
          <span class="security-badge">零上传</span>
          <span class="security-badge">完全私密</span>
        </div>
      </div>

    </div>

    <nav class="nav-bar" aria-label="主导航">
      <a class="nav-item" href="creation-workspace.html">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><polygon points="12,2 22,9 19,20 5,20 2,9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></span>
        <span>创作</span>
      </a>
      <a class="nav-item" href="task-orbit.html">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></span>
        <span>任务</span>
      </a>
      <a class="nav-item" href="private-gallery.html">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="3" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="14" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="14" y="14" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/></svg></span>
        <span>画廊</span>
      </a>
      <a class="nav-item active" href="endpoint-config.html" aria-current="page">
        <span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
        <span>设置</span>
      </a>
    </nav>

  </div>
</div>

<script>
  let apiKeyVisible = false;

  function toggleApiKeyVisibility() {
    apiKeyVisible = !apiKeyVisible;
    const input = document.getElementById('apiKeyInput');
    const eyeIcon = document.getElementById('eyeIcon');
    input.type = apiKeyVisible ? 'text' : 'password';
    eyeIcon.innerHTML = apiKeyVisible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }

  function testConnection() {
    const baseUrl = document.getElementById('baseUrlInput').value.trim();
    const apiKey = document.getElementById('apiKeyInput').value.trim();
    const btn = document.getElementById('testBtn');
    const banner = document.getElementById('resultBanner');

    if (!baseUrl) {
      showBanner('error', '请输入 Base URL', '端点地址不能为空');
      return;
    }
    if (!apiKey) {
      showBanner('error', '请输入 API Key', 'API 密钥不能为空');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    banner.classList.remove('show', 'success', 'error');

    const delay = 800 + Math.random() * 1200;
    setTimeout(() => {
      btn.classList.remove('loading');
      btn.disabled = false;

      const isSuccess = Math.random() > 0.1;
      if (isSuccess) {
        showBanner('success', '通信成功', '已成功连接至 ' + baseUrl + ' — 端点可用');
      } else {
        const errors = [
          { text: '连接超时', detail: 'HTTP 522 — Connection timed out after 15s' },
          { text: '认证失败', detail: 'HTTP 401 Unauthorized — Invalid API key' },
          { text: '端点不可达', detail: 'DNS 解析失败 — 请检查 Base URL 格式' },
        ];
        const err = errors[Math.floor(Math.random() * errors.length)];
        showBanner('error', err.text, err.detail);
      }
    }, delay);
  }

  function showBanner(type, text, detail) {
    const banner = document.getElementById('resultBanner');
    const icon = banner.querySelector('.banner-icon');
    const textEl = banner.querySelector('.banner-text');
    const detailEl = banner.querySelector('.banner-detail');

    banner.classList.remove('show', 'success', 'error');
    void banner.offsetWidth;

    banner.classList.add(type);
    icon.textContent = type === 'success' ? '✓' : '✕';
    textEl.textContent = text;
    detailEl.textContent = detail;

    banner.classList.add('show');

    if (type === 'success') {
      clearTimeout(banner._hideTimeout);
      banner._hideTimeout = setTimeout(() => {
        banner.classList.remove('show');
      }, 4000);
    }
  }
</script>

</body>
</html>
