name: weaveflux
description: Client-only Android AI video generation app.
publish_to: "none"

version: 0.1.5+6

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  dio: ^5.9.2
  file_picker: ^10.3.7
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  flutter_staggered_grid_view: ^0.7.0
  hive: ^2.2.3
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
