name: Android Release

on:
  push:
    branches:
      - main
    paths:
      - "pubspec.yaml"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          VERSION_LINE="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${VERSION_LINE%%+*}"
          VERSION_CODE="${VERSION_LINE#*+}"
          if [[ "$VERSION_CODE" == "$VERSION_LINE" ]]; then
            VERSION_CODE="1"
          fi
          EXPECTED_TAG="v${VERSION_NAME}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "$EXPECTED_TAG" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pubspec version ${VERSION_NAME}." >&2
            echo "Update pubspec.yaml to version: ${GITHUB_REF_NAME#v}+<build_number>, or push tag ${EXPECTED_TAG}." >&2
            exit 1
          fi
          RELEASE_ENABLED="true"
          if [[ "${GITHUB_REF_TYPE}" != "tag" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            BEFORE_SHA="${{ github.event.before }}"
            if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
              BEFORE_SHA="$(git rev-parse HEAD^ 2>/dev/null || true)"
            fi
            PREVIOUS_VERSION=""
            if [[ -n "$BEFORE_SHA" ]]; then
              PREVIOUS_VERSION_LINE="$(git show "${BEFORE_SHA}:pubspec.yaml" 2>/dev/null | grep '^version:' | awk '{print $2}' || true)"
              PREVIOUS_VERSION="${PREVIOUS_VERSION_LINE%%+*}"
            fi
            if [[ "$PREVIOUS_VERSION" == "$VERSION_NAME" ]]; then
              echo "pubspec.yaml changed, but version stayed at ${VERSION_NAME}; skipping release."
              RELEASE_ENABLED="false"
            elif git ls-remote --exit-code --tags origin "refs/tags/${EXPECTED_TAG}" >/dev/null 2>&1; then
              echo "Tag ${EXPECTED_TAG} already exists. Bump pubspec.yaml version before releasing." >&2
              exit 1
            fi
          fi
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${EXPECTED_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_enabled=${RELEASE_ENABLED}" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        if: github.ref_type != 'tag' && steps.version.outputs.release_enabled == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.release_tag }}"
          git push origin "${{ steps.version.outputs.release_tag }}"

      - name: Configure Android signing
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" || -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_ALIAS" || -z "$ANDROID_KEY_PASSWORD" ]]; then
            echo "Android signing secrets are required for release builds." >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build release APK
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        run: >
          flutter build apk --release
          --build-name=${{ steps.version.outputs.version_name }}
          --build-number=${{ steps.version.outputs.version_code }}
          --dart-define=GITHUB_REPOSITORY=${{ github.repository }}
          --dart-define=APP_VERSION=${{ steps.version.outputs.version_name }}

      - name: Prepare artifact
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.release_tag }}"
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/weaveflux-${VERSION}.apk"

      - name: Upload artifact
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: weaveflux-apk
          path: dist/*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          files: dist/*.apk
          generate_release_notes: true
